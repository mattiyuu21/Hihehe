<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>I Miss You, Ja</title>
<style>
* { margin: 0; padding: 0; }
body { background: #000; overflow: hidden; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById("c");
const ctx    = canvas.getContext("2d");

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", () => { resize(); sampleText(); });

const MESSAGE = "I Miss You, Ja :(";
const TEXT_FS = () => Math.floor(canvas.width * 0.028);

// Text dots stored as RELATIVE offsets from center (0,0)
// so we can place them around any explosion point
let textDotsRel = [];
let rockets     = [];
let particles   = [];
let goldAlive   = false;

// ── Sample text as relative offsets ──────────────────────
function sampleText() {
  const off    = document.createElement("canvas");
  off.width    = canvas.width;
  off.height   = canvas.height;
  const ox     = off.getContext("2d");
  const fs     = TEXT_FS();
  ox.font          = `bold ${fs}px "Courier New", monospace`;
  ox.fillStyle     = "#fff";
  ox.textAlign     = "center";
  ox.textBaseline  = "middle";
  // Draw at center temporarily just to sample pixel positions
  const cx = canvas.width  / 2;
  const cy = canvas.height / 2;
  ox.fillText(MESSAGE, cx, cy);
  const d   = ox.getImageData(0, 0, off.width, off.height).data;
  const gap = Math.max(3, Math.floor(fs / 8));
  textDotsRel = [];
  for (let y = 0; y < off.height; y += gap) {
    for (let x = 0; x < off.width; x += gap) {
      if (d[(y * off.width + x) * 4 + 3] > 128) {
        // Store offset relative to where we drew
        textDotsRel.push({ dx: x - cx, dy: y - cy });
      }
    }
  }
  // shuffle
  for (let i = textDotsRel.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [textDotsRel[i], textDotsRel[j]] = [textDotsRel[j], textDotsRel[i]];
  }
}
sampleText();

// ── Color palettes ────────────────────────────────────────
const HUES = [140, 160, 200, 270, 320, 0, 180];

// ── Rocket ────────────────────────────────────────────────
class Rocket {
  constructor(isGold) {
    this.isGold  = isGold;
    this.x       = canvas.width * (0.15 + Math.random() * 0.7);
    this.y       = canvas.height;
    this.vx      = (Math.random() - 0.5) * 0.5;
    this.vy      = -(7 + Math.random() * 4);
    // Gold targets upper area; small ones target random heights
    this.targetY = isGold
      ? canvas.height * (0.18 + Math.random() * 0.25)
      : canvas.height * (0.12 + Math.random() * 0.5);
    this.hue     = isGold ? 45 : HUES[Math.floor(Math.random() * HUES.length)];
    this.dead    = false;
    this.trail   = [];
  }

  update() {
    this.trail.push({ x: this.x, y: this.y });
    if (this.trail.length > 10) this.trail.shift();
    this.x += this.vx;
    this.y += this.vy;
    this.vy += 0.07; // gravity only on the rocket itself
    if (this.y <= this.targetY) {
      this.explode();
      this.dead = true;
    }
  }

  explode() {
    const ex = this.x;
    const ey = this.y;

    if (this.isGold) {
      flashAlpha = 0.65;
      // Radial streaks — NO gravity, they just fade out in place
      for (let i = 0; i < 180; i++) {
        particles.push(new Streak(ex, ey, this.hue, false));
      }
      // Text dots centered exactly on explosion point
      for (let i = 0; i < textDotsRel.length; i++) {
        const rel = textDotsRel[i];
        particles.push(new TextDot(ex, ey, { x: ex + rel.dx, y: ey + rel.dy }));
      }
      goldAlive = true;
      setTimeout(() => {
        particles.forEach(p => { if (p instanceof TextDot) p.release(); });
        setTimeout(() => { goldAlive = false; }, 1600);
      }, 4200);
    } else {
      const count = 30 + Math.floor(Math.random() * 25);
      for (let i = 0; i < count; i++) {
        particles.push(new Streak(ex, ey, this.hue, true));
      }
    }
  }

  draw() {
    for (let i = 0; i < this.trail.length; i++) {
      const a = i / this.trail.length;
      ctx.globalAlpha = a * 0.75;
      ctx.fillStyle   = `hsl(${this.hue},100%,70%)`;
      ctx.fillRect(this.trail[i].x - 1, this.trail[i].y - 1, 2, 2);
    }
    ctx.globalAlpha = 1;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.isGold ? 2.5 : 1.8, 0, Math.PI * 2);
    ctx.fillStyle   = `hsl(${this.hue},100%,80%)`;
    ctx.shadowBlur  = 6;
    ctx.shadowColor = `hsl(${this.hue},100%,90%)`;
    ctx.fill();
    ctx.shadowBlur  = 0;
  }
}

// ── Streak — no gravity, just fade out ───────────────────
class Streak {
  constructor(x, y, hue, small) {
    this.x     = x; this.y = y;
    this.prevX = x; this.prevY = y;
    const ang  = Math.random() * Math.PI * 2;
    const spd  = small ? (0.8 + Math.random() * 3.5) : (2 + Math.random() * 11);
    this.vx    = Math.cos(ang) * spd;
    this.vy    = Math.sin(ang) * spd;
    this.hue   = hue + (Math.random() - 0.5) * 25;
    this.life  = 1;
    this.decay = small
      ? (0.022 + Math.random() * 0.025)
      : (0.009 + Math.random() * 0.011);
    this.size  = small ? (0.7 + Math.random() * 0.8) : (1 + Math.random() * 1.4);
    this.len   = small ? 3 : 7;
  }
  update() {
    this.prevX = this.x; this.prevY = this.y;
    // Decelerate only — NO gravity, NO downward pull
    this.vx *= 0.92;
    this.vy *= 0.92;
    this.x  += this.vx;
    this.y  += this.vy;
    this.life -= this.decay;
  }
  draw() {
    if (this.life <= 0) return;
    ctx.save();
    ctx.globalAlpha = Math.max(0, this.life);
    ctx.strokeStyle = `hsl(${this.hue},100%,68%)`;
    ctx.lineWidth   = this.size;
    ctx.shadowBlur  = 5;
    ctx.shadowColor = `hsl(${this.hue},100%,90%)`;
    ctx.beginPath();
    ctx.moveTo(this.prevX, this.prevY);
    ctx.lineTo(this.x - this.vx * this.len, this.y - this.vy * this.len);
    ctx.stroke();
    ctx.restore();
  }
  get dead() { return this.life <= 0; }
}

// ── Text dot particle ─────────────────────────────────────
class TextDot {
  constructor(x, y, target) {
    this.x       = x; this.y = y;
    this.target  = target;
    const ang    = Math.random() * Math.PI * 2;
    this.vx      = Math.cos(ang) * (1 + Math.random() * 2);
    this.vy      = Math.sin(ang) * (1 + Math.random() * 2);
    this.hue     = 42 + Math.random() * 14;
    this.life    = 1;
    this.seeking = true;
    this.size    = 1.8 + Math.random() * 0.7;
  }
  release() { this.seeking = false; }
  update() {
    if (this.seeking) {
      const dx = this.target.x - this.x;
      const dy = this.target.y - this.y;
      if (Math.hypot(dx, dy) > 1.5) {
        this.vx += dx * 0.14; this.vy += dy * 0.14;
        this.vx *= 0.80;      this.vy *= 0.80;
      } else {
        this.vx = 0; this.vy = 0;
        this.x = this.target.x; this.y = this.target.y;
      }
    } else {
      // drift and fade — no forced gravity, just light random drift
      this.vx += (Math.random() - 0.5) * 0.3;
      this.vy += (Math.random() - 0.5) * 0.3;
      this.vx *= 0.96; this.vy *= 0.96;
      this.life -= 0.022;
    }
    this.x += this.vx; this.y += this.vy;
  }
  draw() {
    if (this.life <= 0) return;
    ctx.save();
    ctx.globalAlpha = Math.max(0, this.life);
    ctx.shadowBlur  = 8;
    ctx.shadowColor = `hsl(${this.hue},100%,90%)`;
    ctx.fillStyle   = `hsl(${this.hue},100%,93%)`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  get dead() { return this.life <= 0; }
}

// ── Flash ─────────────────────────────────────────────────
let flashAlpha = 0;

// ── Launch timing ─────────────────────────────────────────
let frame     = 0;
let lastSmall = 0;
let goldReady = false;
setTimeout(() => { goldReady = true; }, 2500);

function animate() {
  requestAnimationFrame(animate);
  frame++;

  ctx.fillStyle = "rgba(0,0,0,0.20)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (flashAlpha > 0) {
    ctx.fillStyle = `rgba(255,235,150,${flashAlpha * 0.45})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    flashAlpha -= 0.05;
  }

  // Small fireworks always launch
  if (frame - lastSmall > 35 + Math.random() * 50) {
    lastSmall = frame;
    rockets.push(new Rocket(false));
  }

  // Gold fires when ready and previous text cleared
  if (goldReady && !goldAlive) {
    goldReady = false;
    rockets.push(new Rocket(true));
    setTimeout(() => { goldReady = true; }, 4000);
  }

  rockets.forEach(r => { r.update(); r.draw(); });
  rockets = rockets.filter(r => !r.dead);

  particles.forEach(p => { p.update(); p.draw(); });
  particles = particles.filter(p => !p.dead);
}

animate();
</script>
</body>
</html>
